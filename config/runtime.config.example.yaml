# runtime.config.yaml — per-product configuration for my-ai-runtime sync
#
# Copy this file to your product repo root as `runtime.config.yaml` and fill in
# the values. `sync/sync-engine.sh` reads it to substitute {{TOKENS}} into synced
# files (those marked `substitute: true` in sync/manifest.yaml) and to filter
# entries by active language profile.
#
# Anything you omit falls back to an auto-detected or documented default:
#   {{PROJECT_ROOT}} — auto: `git rev-parse --show-toplevel` of the product repo
#   {{PROJECT_NAME}} — auto: basename of the product repo (override below if needed)
#
# Two consumers read this file:
#   1. sync-engine.sh  — substitutes tokens at sync time (static values baked in)
#   2. discipline hooks — read it live at runtime for extensions / discovery tool
#
# ---------------------------------------------------------------------------

# Human-readable project name. → {{PROJECT_NAME}}
# Omit to auto-detect from the repo directory name.
project_name: my-project

# Target OS of the machine Claude Code runs on. → {{OS}}
#   linux   — native paths ($HOME, /tmp)
#   windows — Git Bash; hooks fall back to $USERPROFILE / $TEMP
# WPF note: WPF builds only on native Windows. Use `windows` + Git Bash, never WSL.
os: linux

# Active language profiles. Drives which manifest entries + gate commands apply,
# and which code extensions the discovery-gate guards.
#   python     — pyright LSP, ruff/pytest/mypy gates, discovery via cbm|serena
#   typescript — tsserver LSP, tsc/vitest/eslint gates
#   csharp     — ADOPT mode (see profiles/csharp/adopt.md); dotnet gates,
#                discovery via serena(csharp) | CWM.RoslynNavigator
languages: [python]

# --- codebase-memory-mcp (cbm) — optional code-graph discovery backend ---------
# Leave cbm_project empty ("") to disable cbm entirely (discovery-gate then relaxes
# for languages that have no other discovery backend configured).
cbm_project: ""                                  # → {{CBM_PROJECT}}
cbm_bin: ~/.local/bin/codebase-memory-mcp        # → {{CBM_BIN}} (win: %USERPROFILE%\.local\bin\...)

# Worker / ephemeral state directory (Layer B story machinery; harmless in Layer A).
# → {{STATE_DIR}}   linux default /tmp/claude-workers · windows %TEMP%\claude-workers
state_dir: /tmp/claude-workers

# --- Monorepo layout (optional) — only if rules/gates reference app paths --------
# → {{BACKEND_PATH}} / {{FRONTEND_PATH}} / {{APP_PATHS}} (space-joined)
paths:
  backend: ""
  frontend: ""

# --- Per-language gate commands (override profile defaults) ----------------------
# {paths} is expanded to the relevant profile's target paths at gate time.
gates:
  python:
    lint: "ruff check {paths}"
    test: "pytest {paths}"
    type: "mypy {paths}"
  typescript:
    lint: "eslint {paths}"
    test: "vitest run"
    type: "tsc --noEmit"
  csharp:
    build: "dotnet build"
    test: "dotnet test"
    format: "dotnet format --verify-no-changes"
  # Fallback gate command used by the AO gate-registry catch-all rule.
  default: "echo 'no gate configured'"

# --- AO story-machinery (Layer B) — closed-loop /run-stories harness -------------
# Only consumed when the AO scripts are synced (bootstrap --with-ao). Read live by
# story-machinery/scripts/* via lib/runtime-config-read.sh (env vars override).
ao:
  story_dir: docs/stories            # where story-<ID>.md files live
  story_skill_slug: implement-story  # skill each worker runs (/<slug> <ID>)
  worker_model: opus                 # worker = full Claude Code session (not a subagent) → opus OK
  worker_effort: xhigh
  base_ref: main                     # trunk / PR base
  worktree_root: .claude/worktrees   # per-story git worktree checkout root
  max_parallel: 3                    # wave concurrency (engine hard-caps at 5)
  gh_labels: [ai-generated, story]   # labels applied to opened PRs
  review_agents: [code-reviewer]     # subagents launch-review-worker.sh spawns for post-merge review
  fixup_contour: tooling              # contour/epic tag for auto-generated review-fixup stories
  migrations_dir: ""                 # optional; migration preflight checks skipped when empty
  worker_bot_name: ""                # git author for worker commits (empty → repo default)
  worker_bot_email: ""
  prepare_hook: ""                   # optional shell run in a fresh worktree after prep (e.g. "npm ci")
  worktree_branch_pattern: 'worktree-STORY-*'   # branch glob for worktree hygiene/cleanup
  # Gate registry: first matching changed-path glob picks the gate command
  # (lindy-orchestrator qa_gates style). {gates.default} expands to gates.default above.
  gate_registry:
    - { match: '.*', cmd: '{gates.default}' }

# --- SRS/RTM methodology (Layer B) — OPTIONAL module ----------------------------
# enabled:false → the story flow skips every SRS/RTM sync step; the harness runs
# without a requirements doc. Format is SRS.md(human)+rtm.yaml(machine), IEEE-830
# aligned; acceptance criteria authored in EARS notation (WHEN/IF/THEN).
srs:
  enabled: false
  srs_path: docs/SRS.md
  archive_path: docs/srs/implemented-archive.md
  rtm_path: docs/rtm.yaml
  req_id_prefixes: [FR, NFR, SEC]    # requirement ID taxonomy
  ac_notation: ears
  decisions_path: docs/DECISIONS.md  # optional; ADR/decisions doc for task-context packets
  plan_path: docs/PLAN.md            # optional; plan doc for task-context packets
