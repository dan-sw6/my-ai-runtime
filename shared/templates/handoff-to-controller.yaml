# Handoff: Implementer → Controller
# Canonical handoff schema for closed-loop agent workflow.

handoff:
  from: implementer
  to: controller
  timestamp: null
  story_ref: "STORY-XXX"

  # What was implemented
  completed_tasks:
    - task_id: "TASK-XXX"
      title: ""
      files_modified: []
      files_created: []
      tests_added: []
      notes: ""

  # Evidence
  evidence:
    lint_passed: false
    typecheck_passed: false
    tests_passed: false
    test_output_summary: ""

  # What to verify
  verification_requests:
    - check: ""
      acceptance_criterion_ref: ""
      how_to_verify: ""
